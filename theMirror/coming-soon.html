<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - The Mirror</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #F4F0EB;
            --ink: #2C2C2C;
            --ink-faded: #5A5A5A;
        }
        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Lora', serif;
            line-height: 1.8;
            margin: 0;
            padding: 40px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-family: 'EB Garamond', serif;
            font-size: 4rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }
        p {
            font-family: 'EB Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--ink-faded);
            margin-bottom: 3rem;
        }
        .back-link {
            display: inline-block;
            font-family: 'EB Garamond', serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink);
            text-decoration: none;
            opacity: 0.6;
            border-bottom: 1px solid var(--ink);
            padding-bottom: 2px;
        }
        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon</h1>
        <p>we are still writing this part of history.</p>
        <a href="javascript:history.back()" class="back-link">Return to previous page</a>
    </div>
</body>
</html>
