<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organisation of Knowledge - The Mirror</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #F4F0EB;
            --ink: #2C2C2C;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }
        .journal-container {
            width: 100%;
            padding: 40px;
            box-sizing: border-box;
        }
        .journal-line {
            border-bottom: 1px solid rgba(0,0,0,0.1);
            min-height: 3.5rem;
            display: flex;
            align-items: flex-end;
            padding-bottom: 0.5rem;
            padding-left: 2rem;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #2a2a2a;
            line-height: 1.2;
        }
        .back-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: serif;
            text-decoration: none;
            color: var(--ink);
            opacity: 0.5;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="journal-container">
        <!-- The Page Content -->
        <div class="journal-line">organisation based on A Thousand Plateaus: Capitalism and Schizophrenia (1980)</div>
        <div class="journal-line">by French philosopher Gilles Deleuze and psychoanalyst Félix Guattari</div>
        
        <!-- Empty lines to fill the page -->
        <script>
            for(let i=0; i<30; i++) {
                document.write('<div class="journal-line"></div>');
            }
        </script>
    </div>
    <a href="../" class="back-link">← Back to The Mirror</a>
</body>
</html>
