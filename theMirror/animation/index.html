<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Over City - 3D Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue fallback */
            font-family: sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .window-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .window-cutout {
            width: 55%;
            height: 75%;
            max-width: 500px;
            max-height: 700px;
            border-radius: 140px;
            box-shadow: 0 0 0 4000px #e4e4e7; 
            border: 24px solid #d4d4d8;
            position: relative;
            border-style: inset;
            /* Tilt the window to match the downward perspective */
            transform: perspective(1000px) rotateX(10deg) rotateZ(-2deg);
        }

        .window-glass {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 116px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.0) 30%, rgba(255,255,255,0.0) 70%, rgba(255,255,255,0.1) 100%);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }
        
        .window-dirt {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 116px;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 1px, transparent 2px),
                              radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05) 2px, transparent 3px);
            background-size: 100px 100px;
            opacity: 0.5;
        }

    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div class="window-overlay">
        <div class="window-cutout">
            <div class="window-glass"></div>
            <div class="window-dirt"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const skyColor = new THREE.Color(0x87CEEB);
        scene.background = skyColor;
        scene.fog = new THREE.FogExp2(skyColor, 0.0005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 20000);
        // Positioned for SIDE WINDOW view
        // Plane moves along Z, so we look along X (to the left)
        // High altitude: 1500 units
        camera.position.set(2000, 1500, 4000);
        camera.rotation.y = -Math.PI / 2; // Face left
        camera.rotation.x = -0.3; // Look down at the city

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfff0dd, 1.5);
        dirLight.position.set(5000, 3000, 2000);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 5000;
        dirLight.shadow.camera.bottom = -5000;
        dirLight.shadow.camera.left = -5000;
        dirLight.shadow.camera.right = 5000;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20000, 20000);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Larger City Generation
        const buildingCount = 15000;
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        boxGeo.translate(0, 0.5, 0);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });

        const cityMesh = new THREE.InstancedMesh(boxGeo, boxMat, buildingCount);
        cityMesh.castShadow = true;
        cityMesh.receiveShadow = true;

        const dummy = new THREE.Object3D();
        const color = new THREE.Color();

        for (let i = 0; i < buildingCount; i++) {
            const x = (Math.random() - 0.5) * 12000;
            const z = (Math.random() - 0.5) * 15000;

            const distFromCenter = Math.sqrt(x*x + z*z);
            const baseHeight = Math.random() * 50 + 20;
            const downtownSpire = Math.max(0, 800 - distFromCenter * 0.1) * Math.random();
            const height = baseHeight + downtownSpire;
            
            const width = 20 + Math.random() * 40;
            const depth = 20 + Math.random() * 40;

            dummy.position.set(x, 0, z);
            dummy.scale.set(width, height, depth);
            dummy.updateMatrix();
            cityMesh.setMatrixAt(i, dummy.matrix);

            const shade = Math.random() * 0.4 + 0.3;
            if (Math.random() > 0.9) {
                color.setHSL(0.6, 0.3, shade);
            } else {
                color.setHSL(0, 0, shade);
            }
            cityMesh.setColorAt(i, color);
        }
        scene.add(cityMesh);

        // Large Sea
        const seaGeo = new THREE.PlaneGeometry(10000, 20000);
        const seaMat = new THREE.MeshStandardMaterial({ 
            color: 0x003366, 
            roughness: 0.2, 
            metalness: 0.5,
            transparent: true,
            opacity: 0.9
        });
        const sea = new THREE.Mesh(seaGeo, seaMat);
        sea.rotation.x = -Math.PI / 2;
        // Position sea on the left side (since we're looking left)
        sea.position.set(-8000, 5, 0);
        sea.receiveShadow = true;
        scene.add(sea);

        // Coastline
        const coastGeo = new THREE.PlaneGeometry(600, 20000);
        const coastMat = new THREE.MeshLambertMaterial({ color: 0xc2b280 });
        const coast = new THREE.Mesh(coastGeo, coastMat);
        coast.rotation.x = -Math.PI / 2;
        coast.position.set(-3300, 3, 0);
        scene.add(coast);

        const clock = new THREE.Clock();
        const flightSpeed = 600; // Faster speed for higher altitude

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Movement along Z-axis (forward flight)
            camera.position.z -= flightSpeed * delta;

            // Side window tilt and vibration
            camera.rotation.z = Math.sin(time * 0.3) * 0.01;
            camera.position.y = 1500 + Math.sin(time * 1.5) * 4;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
