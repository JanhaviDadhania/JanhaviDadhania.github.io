<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs - The Mirror</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #F4F0EB;
            --ink: #2C2C2C;
            --ink-faded: #5A5A5A;
        }
        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Lora', serif;
            line-height: 1.8;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            font-family: 'EB Garamond', serif;
            font-size: 3rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--ink);
            padding-bottom: 1rem;
        }
        .section-list {
            list-style: none;
            padding: 0;
        }
        .section-item {
            margin-bottom: 2rem;
        }
        .section-title {
            font-family: 'EB Garamond', serif;
            font-size: 1.5rem;
            color: var(--ink);
            text-decoration: none;
            display: block;
        }
        a.section-title:hover {
            text-decoration: underline;
        }
        .unlinked {
            color: var(--ink-faded);
            cursor: default;
        }
        .back-link {
            margin-top: 4rem;
            display: inline-block;
            font-family: 'EB Garamond', serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink);
            text-decoration: none;
            opacity: 0.6;
        }
        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Blogs</h1>
        <ul class="section-list">
            <li class="section-item">
                <a href="next/" class="section-title">what is going to happen next?</a>
            </li>
            <li class="section-item">
                <span class="section-title unlinked">what has already happened?</span>
            </li>
            <li class="section-item">
                <span class="section-title unlinked">who is earning how much?</span>
            </li>
            <li class="section-item">
                <span class="section-title unlinked">who is friends with who?</span>
            </li>
        </ul>
        <a href="../" class="back-link">← Back to The Mirror</a>
    </div>
</body>
</html>
